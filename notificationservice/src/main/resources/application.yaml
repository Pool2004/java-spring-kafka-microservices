spring:
  application:
    name: notificationservice

  datasource:
    url: jdbc:mysql://localhost:3306/java_microservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.personal: DEBUG
    org.springframework.kafka: INFO

server:
  port: 8083
